events {
    worker_connections 1024;
}

http {

    upstream backend {
        server backend:8000;
    }

    # ── Rate limiting (basic protection) ──
    limit_req_zone $binary_remote_addr zone=api:10m rate=60r/m;
    limit_req_zone $binary_remote_addr zone=upload:10m rate=10r/m;

    server {
        listen 80;
        server_name _;
        client_max_body_size 200M;   # allow large photo uploads

        # ── API Backend ──
        location /api/ {
            limit_req zone=api burst=30 nodelay;
            proxy_pass http://backend/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 300s;     # long timeout for AI grading
            proxy_send_timeout 300s;
        }

        # ── Upload endpoint — larger burst ──
        location /api/upload/ {
            limit_req zone=upload burst=20 nodelay;
            proxy_pass http://backend/upload/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 600s;     # very long for chunked uploads
            proxy_send_timeout 600s;
        }

        # ── WebSocket (real-time progress) ──
        location /ws/ {
            proxy_pass http://backend/ws/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
        }

        # ── MinIO direct access ──
        location /storage/ {
            proxy_pass http://minio:9000/;
        }

        # ── Health check ──
        location /health {
            proxy_pass http://backend/health;
        }
    }
}
